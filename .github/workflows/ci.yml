name: CI

on:
  push:
    branches: [main]
    tags: ['clad-body/v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Install dependencies
        run: UV_PROJECT_ENVIRONMENT=venv uv sync --extra anny --extra mhr --extra dev

      - name: Download MHR assets
        run: |
          curl -L https://github.com/facebookresearch/MHR/releases/download/v1.0.0/assets.zip -o /tmp/mhr_assets.zip
          unzip /tmp/mhr_assets.zip -d venv/lib/python3.12/site-packages/

      - name: Run tests
        run: venv/bin/pytest tests/ -v

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/clad-body/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write  # create GitHub release
      id-token: write  # PyPI OIDC trusted publishing

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0  # full history for git log between tags

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Build
        run: uv build

      - name: Generate release notes
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep "^clad-body/v" | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log "$TAG" --oneline | grep -vE "^[a-f0-9]+ (chore|minor):" | grep -v "initial commit")
          else
            COMMITS=$(git log "${PREV_TAG}..${TAG}" --oneline | grep -vE "^[a-f0-9]+ (chore|minor):")
          fi

          FEATS=$(echo "$COMMITS" | grep "^[a-f0-9]* feat:" | sed 's/^[a-f0-9]* feat: /- /')
          FIXES=$(echo "$COMMITS" | grep "^[a-f0-9]* fix:" | sed 's/^[a-f0-9]* fix: /- /')
          REFACTORS=$(echo "$COMMITS" | grep "^[a-f0-9]* refactor:" | sed 's/^[a-f0-9]* refactor: /- /')

          NOTES=""
          [ -n "$FEATS" ]     && NOTES="${NOTES}### Features\n${FEATS}\n\n"
          [ -n "$FIXES" ]     && NOTES="${NOTES}### Fixes\n${FIXES}\n\n"
          [ -n "$REFACTORS" ] && NOTES="${NOTES}### Refactors\n${REFACTORS}\n\n"
          [ -z "$NOTES" ]     && NOTES="Maintenance release."

          printf '%b' "$NOTES" | sed 's/[[:space:]]*$//' > /tmp/release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          make_latest: true
          body_path: /tmp/release_notes.txt
          files: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
